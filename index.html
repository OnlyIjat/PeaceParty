    </div>

    <div class="wait">
        <h6>We are waiting for your arrival.</h6>
    </div>
    <audio id="bgm" loop>
        <source src="ANJINGDUB-DITAMAN.mp3" type="audio/mpeg">
    </audio>

    <script>
const music = document.getElementById("bgm");

function startMusic() {
    music.volume = 0;
    music.play().then(() => {
        let fade = setInterval(() => {
            if (music.volume < 0.95) {
                music.volume += 0.05;
            } else {
                music.volume = 1;
                clearInterval(fade);
            }
        }, 100);
    }).catch(() => {
        console.log("Autoplay diblokir browser");
    });
}
    </script>
